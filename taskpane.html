<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskManager Automation</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <link rel="stylesheet" href="taskpane.css">
</head>
<body class="ms-font-m ms-welcome">
    <header class="header">
        <h1>DeskManager</h1>
    </header>
    <main class="content">
        <p id="status-message">Carregando dados do e-mail...</p>
        <div id="email-data" style="display: none;">
            <p><strong>Remetente:</strong> <span id="sender"></span></p>
            <p><strong>Assunto:</strong> <span id="subject"></span></p>
        </div>
        <button id="btn-open-ticket" class="ms-Button">
            <span class="ms-Button-label">Prosseguir para DeskManager</span>
        </button>
    </main>
    <script src="taskpane.js"></script>
</body>
</html>
